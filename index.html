<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🎓 Student Management System</h1>

    <!-- Form -->
    <div class="form">
      <input id="name" placeholder="Enter Name">
      <input id="age" placeholder="Enter Age" type="number">
      
      <!-- ✅ Main Button -->
      <button id="submitBtn" onclick="addStudent()">Add Student</button>
      
      <!-- ✅ Cancel Button (for update mode) -->
      <button onclick="cancelEdit()">Cancel</button>
    </div>

    <!-- Search -->
    <input id="search" placeholder="Search student..." onkeyup="searchStudent()">

    <!-- List -->
    <div id="list" class="student-list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
